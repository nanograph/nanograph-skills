# nanograph project config for SPIKE Intel.
# Keep secrets in .env.nano, not in this file.

[project]
name = "SPIKE Intel — AI Industry Knowledge Graph"
description = "AI/ML industry intelligence modeled on the SPIKE framework (Signal, Pattern, Insight, KnowHow, Element)."
instruction = "Run nanograph commands from this directory. Prefer `nanograph run <alias>` over raw --query / --name / --param invocations."

[db]
default_path = "spike-intel.nano"

[schema]
default_path = "schema.pg"

[query]
roots = ["queries"]

# Vector(3072) requires a 3072-dim embedding model.
# Options:
#   - gemini + gemini-embedding-2-preview (native 3072, text + multimodal) — default
#   - openai + text-embedding-3-large (native 3072, text-only)
# Put the matching API key in .env.nano.
[embedding]
provider = "gemini"
model = "gemini-embedding-2-preview"
batch_size = 64
chunk_size = 0
chunk_overlap_chars = 128

[cli]
table_max_column_width = 80
table_cell_layout = "truncate"


# ──────────────────────────────────────────────
# Reads — Signals
# ──────────────────────────────────────────────

[query_aliases.signal]
query = "signals.gq"
name = "get_signal"
args = ["slug"]
format = "kv"

[query_aliases.signals]
query = "signals.gq"
name = "recent_signals"
format = "json"

[query_aliases.similar-signals]
query = "signals.gq"
name = "similar_signals"
args = ["q"]
format = "json"

